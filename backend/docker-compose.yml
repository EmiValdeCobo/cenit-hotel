version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: cenit_postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Mount the initial dump to be executed when the DB initializes
      # However, since we want Alembic to create the tables, we will NOT use docker-entrypoint-initdb.d
      # We will run the seed manually or through the app after alembic runs

  api:
    build: .
    image: cenit
    container_name: cenit_fastapi
    restart: always
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=${DATABASE_URL_DOCKER}
    depends_on:
      - db
    volumes:
      - .:/app

volumes:
  postgres_data:
